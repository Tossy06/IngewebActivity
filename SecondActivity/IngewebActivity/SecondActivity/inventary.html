<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <title>Inventario</title>
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="./index.html">Globales S.A</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="./index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="./user.html">Usuarios</a></li>
        <li class="nav-item"><a class="nav-link active" href="./inventary.html">Inventario</a></li>
      </ul>
    </div>
  </nav>
</header>

<main class="container my-4">
  <h2 class="mb-4">Gestión de Inventario</h2>

  <!-- Formulario -->
  <div class="card mb-4">
    <div class="card-header">Movimiento de Inventario</div>
    <div class="card-body">
      <form id="inventaryForm">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Producto</label>
            <input type="text" class="form-control" id="product" required>
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" id="quantity" min="1" required>
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label">Tipo</label>
            <select class="form-select" id="type" required>
              <option value="">Seleccione</option>
              <option value="entrada">Entrada</option>
              <option value="salida">Salida</option>
            </select>
          </div>

          <div class="col-md-2 mb-3 d-flex align-items-end">
            <button class="btn btn-success w-100">
              <i class="bi bi-arrow-left-right"></i> Registrar
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-header">Inventario Actual</div>
    <div class="card-body">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Stock</th>
            <th>Entradas</th>
            <th>Salidas</th>
          </tr>
        </thead>
        <tbody id="inventaryTable">
          <!-- JS -->
        </tbody>
      </table>
    </div>
  </div>
</main>

<script type="module" src="./js/inventary.js"></script>
</body>
</html>
