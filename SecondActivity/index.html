<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | Distribuciones Globales S.A</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
  >

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- ========== HEADER / NAVBAR ========== -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="./index.html">Globales S.A</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./user.html">Usuarios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./inventary.html">Inventario</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- ========== MAIN / DASHBOARD ========== -->
  <main class="container my-5">

    <!-- Título -->
    <section class="mb-4">
      <h2 class="fw-bold">Dashboard General</h2>
      <p class="text-muted mb-0">
        Indicadores clave del sistema de usuarios e inventarios
      </p>
    </section>

    <!-- ===== USUARIOS ===== -->
    <section class="mb-5">
      <h6 class="text-uppercase text-muted mb-3">Usuarios</h6>

      <div class="row g-4">

        <div class="col-md-4">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-primary text-white me-3">
                <i class="bi bi-people-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Total de Usuarios</p>
                <h4 class="mb-0" id="totalUsers">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-dark text-white me-3">
                <i class="bi bi-shield-lock-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Administradores</p>
                <h4 class="mb-0" id="totalAdmins">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-secondary text-white me-3">
                <i class="bi bi-person-badge-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Empleados</p>
                <h4 class="mb-0" id="totalEmployees">0</h4>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- ===== INVENTARIO ===== -->
    <section>
      <h6 class="text-uppercase text-muted mb-3">Inventario</h6>

      <div class="row g-4">

        <div class="col-md-3">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-success text-white me-3">
                <i class="bi bi-box-seam-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Productos</p>
                <h4 class="mb-0" id="totalProducts">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-warning text-white me-3">
                <i class="bi bi-archive-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Stock Total</p>
                <h4 class="mb-0" id="totalStock">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-info text-white me-3">
                <i class="bi bi-arrow-down-square-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Entradas</p>
                <h4 class="mb-0" id="totalEntries">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-danger text-white me-3">
                <i class="bi bi-arrow-up-square-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Salidas</p>
                <h4 class="mb-0" id="totalOutputs">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm kpi-card">
            <div class="card-body d-flex align-items-center">
              <div class="icon-box bg-danger text-white me-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
              </div>
              <div>
                <p class="text-muted mb-1">Productos con Stock Bajo</p>
                <h4 class="mb-0" id="lowStockProducts">0</h4>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ========== SCRIPTS ========== -->
  <script type="module" src="./js/dashboard.js"></script>

</body>
</html>
